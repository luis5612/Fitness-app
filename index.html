<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fitness">
  <meta name="theme-color" content="#d97706">
  <title>Fitness - AI Personal Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { 
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    body { 
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    button, input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    button {
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-active:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FitnessApp = () => {
      const [profile, setProfile] = useState(null);
      const [apiKey, setApiKey] = useState('');
      const [currentView, setCurrentView] = useState('home');
      const [showSettings, setShowSettings] = useState(false);
      const [showProfileForm, setShowProfileForm] = useState(false);
      const [formData, setFormData] = useState({ name: '', age: '', weight: '', height: '' });

      useEffect(() => {
        const saved = localStorage.getItem('fitnessProfile');
        const savedKey = localStorage.getItem('fitnessApiKey');
        if (saved) setProfile(JSON.parse(saved));
        if (savedKey) setApiKey(savedKey);
      }, []);

      const handleSaveProfile = () => {
        if (formData.name && formData.age && formData.weight && formData.height) {
          setProfile(formData);
          localStorage.setItem('fitnessProfile', JSON.stringify(formData));
          setShowProfileForm(false);
        } else {
          alert('Completa todos los campos');
        }
      };

      const handleSaveApiKey = () => {
        if (apiKey.trim()) {
          localStorage.setItem('fitnessApiKey', apiKey);
          alert('✅ API Key guardada');
          setShowSettings(false);
        } else {
          alert('Introduce una API Key válida');
        }
      };

      if (!profile) {
        return (
          <div className="min-h-screen bg-stone-50 p-6">
            <div className="max-w-md mx-auto space-y-6">
              <div className="text-center mb-8">
                <div className="text-6xl mb-4">💪</div>
                <h1 className="text-3xl font-bold text-amber-900 mb-2">Fitness AI</h1>
                <p className="text-stone-600">Tu entrenador personal con IA</p>
              </div>

              <div className="bg-white rounded-2xl p-6 shadow-lg space-y-4">
                <h2 className="text-xl font-bold text-amber-900 mb-4">Crea tu perfil</h2>
                
                <input
                  type="text"
                  placeholder="Tu nombre"
                  value={formData.name}
                  onChange={(e) => setFormData({...formData, name: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <input
                  type="number"
                  placeholder="Edad"
                  value={formData.age}
                  onChange={(e) => setFormData({...formData, age: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <input
                  type="number"
                  placeholder="Peso (kg)"
                  value={formData.weight}
                  onChange={(e) => setFormData({...formData, weight: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <input
                  type="number"
                  placeholder="Altura (cm)"
                  value={formData.height}
                  onChange={(e) => setFormData({...formData, height: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <button
                  onClick={handleSaveProfile}
                  className="w-full bg-amber-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg btn-active"
                >
                  Empezar
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-stone-50 pb-24">
          <div className="p-6 space-y-6">
            {/* Header */}
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-3xl font-bold text-amber-900">Hola, {profile.name}</h1>
                <p className="text-stone-600">Peso: {profile.weight}kg · {profile.age} años</p>
              </div>
              <button
                onClick={() => setShowSettings(true)}
                className="p-3 bg-amber-100 rounded-full btn-active"
              >
                <span className="text-2xl">⚙️</span>
              </button>
            </div>

            {/* Racha */}
            <div className="bg-gradient-to-br from-orange-50 to-red-50 p-6 rounded-2xl border-2 border-orange-200">
              <div className="text-center">
                <div className="text-5xl mb-2">🔥</div>
                <p className="text-3xl font-bold text-orange-900">0 días</p>
                <p className="text-sm text-stone-600 mt-1">Racha actual</p>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-gradient-to-br from-amber-50 to-amber-100 p-5 rounded-2xl border-2 border-amber-200">
                <div className="text-3xl mb-2">🎯</div>
                <p className="text-2xl font-bold text-amber-900">{profile.weight}kg</p>
                <p className="text-sm text-stone-600">Peso</p>
              </div>
              <div className="bg-gradient-to-br from-purple-50 to-purple-100 p-5 rounded-2xl border-2 border-purple-200">
                <div className="
