<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fitness">
  <meta name="theme-color" content="#d97706">
  <title>Fitness - AI Personal Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { 
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    body { 
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    button, input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    button {
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-active:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FitnessApp = () => {
      const [profile, setProfile] = useState(null);
      const [apiKey, setApiKey] = useState('');
      const [currentView, setCurrentView] = useState('home');
      const [showSettings, setShowSettings] = useState(false);
      const [showProfileForm, setShowProfileForm] = useState(false);
      const [formData, setFormData] = useState({ name: '', age: '', weight: '', height: '' });

      useEffect(() => {
        const saved = localStorage.getItem('fitnessProfile');
        const savedKey = localStorage.getItem('fitnessApiKey');
        if (saved) setProfile(JSON.parse(saved));
        if (savedKey) setApiKey(savedKey);
      }, []);

      const handleSaveProfile = () => {
        if (formData.name && formData.age && formData.weight && formData.height) {
          setProfile(formData);
          localStorage.setItem('fitnessProfile', JSON.stringify(formData));
          setShowProfileForm(false);
        } else {
          alert('Completa todos los campos');
        }
      };

      const handleSaveApiKey = () => {
        if (apiKey.trim()) {
          localStorage.setItem('fitnessApiKey', apiKey);
          alert('✅ API Key guardada');
          setShowSettings(false);
        } else {
          alert('Introduce una API Key válida');
        }
      };

      if (!profile) {
        return (
          <div className="min-h-screen bg-stone-50 p-6">
            <div className="max-w-md mx-auto space-y-6">
              <div className="text-center mb-8">
                <div className="text-6xl mb-4">💪</div>
                <h1 className="text-3xl font-bold text-amber-900 mb-2">Fitness AI</h1>
                <p className="text-stone-600">Tu entrenador personal con IA</p>
              </div>

              <div className="bg-white rounded-2xl p-6 shadow-lg space-y-4">
                <h2 className="text-xl font-bold text-amber-900 mb-4">Crea tu perfil</h2>
                
                <input
                  type="text"
                  placeholder="Tu nombre"
                  value={formData.name}
                  onChange={(e) => setFormData({...formData, name: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <input
                  type="number"
                  placeholder="Edad"
                  value={formData.age}
                  onChange={(e) => setFormData({...formData, age: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <input
                  type="number"
                  placeholder="Peso (kg)"
                  value={formData.weight}
                  onChange={(e) => setFormData({...formData, weight: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <input
                  type="number"
                  placeholder="Altura (cm)"
                  value={formData.height}
                  onChange={(e) => setFormData({...formData, height: e.target.value})}
                  className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl text-lg focus:border-amber-500 focus:outline-none"
                />
                
                <button
                  onClick={handleSaveProfile}
                  className="w-full bg-amber-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg btn-active"
                >
                  Empezar
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-stone-50 pb-24">
          <div className="p-6 space-y-6">
            {/* Header */}
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-3xl font-bold text-amber-900">Hola, {profile.name}</h1>
                <p className="text-stone-600">Peso: {profile.weight}kg · {profile.age} años</p>
              </div>
              <button
                onClick={() => setShowSettings(true)}
                className="p-3 bg-amber-100 rounded-full btn-active"
              >
                <span className="text-2xl">⚙️</span>
              </button>
            </div>

            {/* Racha */}
            <div className="bg-gradient-to-br from-orange-50 to-red-50 p-6 rounded-2xl border-2 border-orange-200">
              <div className="text-center">
                <div className="text-5xl mb-2">🔥</div>
                <p className="text-3xl font-bold text-orange-900">0 días</p>
                <p className="text-sm text-stone-600 mt-1">Racha actual</p>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-gradient-to-br from-amber-50 to-amber-100 p-5 rounded-2xl border-2 border-amber-200">
                <div className="text-3xl mb-2">🎯</div>
                <p className="text-2xl font-bold text-amber-900">{profile.weight}kg</p>
                <p className="text-sm text-stone-600">Peso</p>
              </div>
              <div className="bg-gradient-to-br from-purple-50 to-purple-100 p-5 rounded-2xl border-2 border-purple-200">
                <div className="text-3xl mb-2">🏆</div>
                <p className="text-2xl font-bold text-purple-900">0</p>
                <p className="text-sm text-stone-600">Logros</p>
              </div>
            </div>

            {/* Menu Cards */}
            <div className="space-y-3">
              {[
                { emoji: '💪', title: 'Entrenamiento', subtitle: 'Rutina personalizada con IA', color: 'red' },
                { emoji: '🥗', title: 'Nutrición', subtitle: 'Plan de comidas y lista de compra', color: 'amber' },
                { emoji: '📊', title: 'Estadísticas', subtitle: 'Tu progreso y logros', color: 'blue' },
                { emoji: '📅', title: 'Historial', subtitle: 'Todos tus registros', color: 'stone' }
              ].map((item, i) => (
                <button
                  key={i}
                  onClick={() => alert(`Próximamente: ${item.title}`)}
                  className="w-full bg-white p-5 rounded-2xl shadow-sm border-2 border-stone-200 btn-active"
                >
                  <div className="flex items-center gap-4">
                    <div className="text-4xl">{item.emoji}</div>
                    <div className="text-left flex-1">
                      <p className="font-bold text-lg text-amber-900">{item.title}</p>
                      <p className="text-sm text-stone-600">{item.subtitle}</p>
                    </div>
                    <div className="text-2xl text-stone-400">›</div>
                  </div>
                </button>
              ))}
            </div>
          </div>

          {/* Settings Modal */}
          {showSettings && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-2xl font-bold text-amber-900">Configuración</h3>
                  <button
                    onClick={() => setShowSettings(false)}
                    className="text-3xl text-stone-400 btn-active"
                  >
                    ✕
                  </button>
                </div>
                
                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-bold text-stone-700 mb-2">
                      API Key de Anthropic
                    </label>
                    <input
                      type="password"
                      value={apiKey}
                      onChange={(e) => setApiKey(e.target.value)}
                      placeholder="sk-ant-..."
                      className="w-full p-4 bg-stone-50 border-2 border-stone-200 rounded-xl focus:border-amber-500 focus:outline-none"
                    />
                    <button
                      onClick={handleSaveApiKey}
                      className="w-full mt-3 bg-amber-600 text-white p-4 rounded-xl font-bold shadow-lg btn-active"
                    >
                      Guardar API Key
                    </button>
                  </div>
                  
                  <div className="border-t-2 border-stone-200 pt-4">
                    <p className="text-sm text-stone-600">
                      <strong>Versión:</strong> 2.0<br/>
                      <strong>Creado con:</strong> Claude AI
                    </p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Bottom Navigation */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-stone-200 flex justify-around p-4 shadow-lg">
            {[
              { emoji: '🏠', label: 'Inicio', active: true },
              { emoji: '💪', label: 'Rutina', active: false },
              { emoji: '🥗', label: 'Nutrición', active: false },
              { emoji: '📊', label: 'Stats', active: false }
            ].map((item, i) => (
              <button
                key={i}
                onClick={() => alert(`Próximamente: ${item.label}`)}
                className={`flex flex-col items-center gap-1 p-2 rounded-xl btn-active ${item.active ? 'text-amber-600' : 'text-stone-400'}`}
              >
                <div className="text-2xl">{item.emoji}</div>
                <span className="text-xs font-semibold">{item.label}</span>
              </button>
            ))}
          </div>

          {/* Floating Chat Button */}
          <button
            onClick={() => alert('Chat con IA - Próximamente')}
            className="fixed bottom-28 right-6 bg-gradient-to-br from-amber-600 to-red-600 text-white p-5 rounded-full shadow-2xl btn-active"
          >
            <span className="text-3xl">💬</span>
          </button>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FitnessApp />);
  </script>
</body>
</html>
