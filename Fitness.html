<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Placeholder para iconos
    const Icon = ({ name, size = 24, className = "" }) => (
      <div className={`inline-block ${className}`} style={{ width: size, height: size }}>
        {name === 'flame' && '🔥'}
        {name === 'target' && '🎯'}
        {name === 'award' && '🏆'}
        {name === 'dumbbell' && '💪'}
        {name === 'food' && '🥗'}
        {name === 'chart' && '📊'}
        {name === 'calendar' && '📅'}
        {name === 'settings' && '⚙️'}
        {name === 'chat' && '💬'}
        {name === 'check' && '✓'}
        {name === 'x' && '✕'}
      </div>
    );

    const FitnessApp = () => {
      const [profile, setProfile] = useState(null);
      const [apiKey, setApiKey] = useState('');
      const [currentView, setCurrentView] = useState('home');

      useEffect(() => {
        const saved = localStorage.getItem('fitnessProfile');
        const savedKey = localStorage.getItem('fitnessApiKey');
        if (saved) setProfile(JSON.parse(saved));
        if (savedKey) setApiKey(savedKey);
      }, []);

      if (!profile) {
        return (
          <div className="p-6 space-y-6 min-h-screen bg-stone-50">
            <h2 className="text-2xl font-bold text-amber-900">Configura tu Perfil</h2>
            <p className="text-stone-600">Completa tus datos para empezar</p>
            <button 
              onClick={() => {
                const name = prompt('Tu nombre:');
                const age = prompt('Tu edad:');
                const weight = prompt('Tu peso (kg):');
                const height = prompt('Tu altura (cm):');
                if (name && age && weight && height) {
                  const p = { name, age, weight, height };
                  setProfile(p);
                  localStorage.setItem('fitnessProfile', JSON.stringify(p));
                }
              }}
              className="w-full bg-amber-700 text-white p-4 rounded-lg font-semibold"
            >
              Crear Perfil
            </button>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-stone-50 pb-20">
          <div className="p-6 space-y-6">
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-3xl font-bold text-amber-900">Hola, {profile.name}</h1>
                <p className="text-stone-600">Tu peso: {profile.weight}kg</p>
              </div>
              <button onClick={() => setCurrentView('settings')}>
                <Icon name="settings" size={28} className="text-amber-700" />
              </button>
            </div>

            <div className="bg-gradient-to-br from-orange-50 to-red-50 p-6 rounded-xl border border-orange-200">
              <div className="text-center">
                <Icon name="flame" size={48} />
                <p className="text-3xl font-bold text-orange-900 mt-2">¡Empecemos!</p>
                <p className="text-sm text-stone-600 mt-1">Configura tu API Key para usar IA</p>
              </div>
            </div>

            <div className="space-y-3">
              {[
                { icon: 'dumbbell', title: 'Entrenamiento', subtitle: 'Rutina personalizada con IA' },
                { icon: 'food', title: 'Nutrición', subtitle: 'Plan de comidas y lista de compra' },
                { icon: 'chart', title: 'Estadísticas', subtitle: 'Tu progreso y logros' },
                { icon: 'calendar', title: 'Historial', subtitle: 'Todos tus registros' }
              ].map((item, i) => (
                <div key={i} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                  <div className="flex items-center gap-3">
                    <Icon name={item.icon} size={28} />
                    <div>
                      <p className="font-semibold text-amber-900">{item.title}</p>
                      <p className="text-sm text-stone-600">{item.subtitle}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {currentView === 'settings' && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl p-6 max-w-md w-full">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-xl font-bold">Configuración</h3>
                  <button onClick={() => setCurrentView('home')}>
                    <Icon name="x" size={24} />
                  </button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-semibold mb-2">API Key Anthropic</label>
                    <input
                      type="password"
                      value={apiKey}
                      onChange={(e) => setApiKey(e.target.value)}
                      placeholder="sk-ant-..."
                      className="w-full p-3 bg-stone-100 border rounded-lg"
                    />
                    <button
                      onClick={() => {
                        localStorage.setItem('fitnessApiKey', apiKey);
                        alert('✅ Guardado');
                      }}
                      className="w-full mt-2 bg-amber-700 text-white p-3 rounded-lg font-semibold"
                    >
                      Guardar
                    </button>
                  </div>
                  <div className="text-sm text-stone-600">
                    <p>Versión: 2.0</p>
                    <p>Con Claude AI</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3">
            {['home', 'workout', 'nutrition', 'stats'].map((view, i) => (
              <button key={i} onClick={() => setCurrentView(view)} className="flex flex-col items-center">
                <Icon name={view === 'home' ? 'dumbbell' : view === 'workout' ? 'chart' : view === 'nutrition' ? 'food' : 'calendar'} size={24} />
                <span className="text-xs mt-1">{view === 'home' ? 'Inicio' : view === 'workout' ? 'Rutina' : view === 'nutrition' ? 'Nutrición' : 'Stats'}</span>
              </button>
            ))}
          </div>

          <button className="fixed bottom-24 right-6 bg-gradient-to-br from-amber-600 to-red-600 text-white p-4 rounded-full shadow-lg">
            <Icon name="chat" size={24} />
          </button>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FitnessApp />);
  </script>
